<!DOCTYPE html>
<html>
<head>
    <title>Login by Code</title>
</head>
<body>
    <h2>User Login</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Enter 4-digit code:</label>
        <input type="text" name="code" maxlength="4" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}
</body>
</html>
