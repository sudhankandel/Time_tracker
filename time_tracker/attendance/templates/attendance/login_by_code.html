<!DOCTYPE html>
<html>
<head>
    <title>Login by Code</title>
</head>
<body>
    <h1>Login</h1>
    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="code" placeholder="Enter your 4-digit code" required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
